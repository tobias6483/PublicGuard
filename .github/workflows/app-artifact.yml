name: App Artifact

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-app-artifact:
    name: Build App Artifact
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Swift version
        run: swift --version

      - name: Run release check
        run: scripts/release_check.sh

      - name: Upload unsigned app artifact
        uses: actions/upload-artifact@v7
        with:
          name: PublicGuard-unsigned-app
          path: |
            dist/artifacts/PublicGuard.app.zip
            dist/artifacts/PublicGuard.app.zip.sha256
          if-no-files-found: error
