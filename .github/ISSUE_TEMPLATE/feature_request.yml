name: Feature request
description: Suggest a trigger, action, workflow, or privacy improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What real-world situation should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should PublicGuard do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Trigger
        - Action
        - Menu bar UX
        - Privacy/security
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy considerations
      description: Does this require new permissions, data collection, networking, camera, microphone, Bluetooth, or location access?
